  <body>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries try to overwrite fetch in some sandboxed environments.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch && !Object.getOwnPropertyDescriptor(window, 'fetch')?.writable) {
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Failed to make fetch writable:', e);
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
